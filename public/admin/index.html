<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Conteúdo — Movisul</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
    <script src="https://unpkg.com/netlify-cms-locales@^1.0.0/dist/locale-pt.js"></script>
    <script>
      CMS.registerLocale('pt', window.netlifyLocales.pt)

      var cms = document.querySelector('body')
      var observer = new MutationObserver(function () {
        var config = CMS.getConfig ? CMS.getConfig() : null
        if (config) {
          observer.disconnect()
        }
      })

      window.addEventListener('load', function () {
        CMS.registerLocale('pt', window.netlifyLocales.pt)
      })
    </script>
  </body>
</html>
